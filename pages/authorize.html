<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>授权确认</title>
    <link rel="stylesheet" href="/styles.css?v=20260609-192948" />
    <script src="/config.js"></script>
  </head>
  <body>
    <main class="auth-shell">
      <section class="auth-panel consent-panel" aria-label="授权确认">
        <div class="brand">
          <span class="mark">AUTH</span>
          <div>
            <h1>授权确认</h1>
            <p id="user-text">正在读取授权请求。</p>
          </div>
        </div>
        <div id="client-detail" class="consent-detail"></div>
        <p id="message" class="message" role="status"></p>
        <div class="consent-actions">
          <button type="button" id="allow-button">继续授权</button>
          <button type="button" id="deny-button" class="secondary-button">拒绝</button>
        </div>
      </section>
    </main>
    <script src="/authorize.js" type="module"></script>
  </body>
</html>
