<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>统一登陆平台控制台</title>
    <link rel="stylesheet" href="/styles.css?v=20260609-192948" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@nutui/nutui@4.3.15-beta.1/dist/style.css" media="(max-width: 860px)" />
    <script src="/config.js"></script>
  </head>
  <body class="console-body">
    <div id="dashboard-loading" class="dashboard-loading"><span class="dashboard-spinner" aria-label="加载中"></span></div>
    <div id="mobile-app" hidden></div>
    <div id="dashboard-app" class="console-layout" hidden>
      <aside class="console-sidebar" aria-label="主导航">
        <div class="console-brand">
          <span class="console-logo">SSO</span>
          <span>
            <strong>统一登陆平台</strong>
            <small>your-domain.example</small>
          </span>
        </div>

        <nav class="console-nav">
          <a class="console-nav-item active" href="/dashboard" data-view="dashboard" aria-current="page">
            <span class="nav-icon">▦</span>
            仪表盘
          </a>
          <a class="console-nav-item" href="/account" data-view="account">
            <span class="nav-icon">◎</span>
            账号中心
          </a>
          <a class="console-nav-item" href="/grants" data-view="grants">
            <span class="nav-icon">◇</span>
            授权应用
          </a>
          <a class="console-nav-item" href="/sessions" data-view="sessions">
            <span class="nav-icon">◷</span>
            登录会话
          </a>
        </nav>

        <div id="admin-nav" class="console-nav admin-nav" hidden>
          <p>系统管理</p>
          <a class="console-nav-item" href="/users" data-view="users">
            <span class="nav-icon">◌</span>
            用户管理
          </a>
          <a class="console-nav-item" href="/clients" data-view="clients">
            <span class="nav-icon">⌁</span>
            应用接入
          </a>
          <a class="console-nav-item" href="/smtp" data-view="smtp">
            <span class="nav-icon">✉</span>
            邮件设置
          </a>
          <a class="console-nav-item" href="/audit" data-view="audit">
            <span class="nav-icon">≡</span>
            审计日志
          </a>
        </div>
      </aside>

      <main class="console-main">
        <header class="console-topbar">
          <div>
            <h1 id="view-title">仪表盘</h1>
            <p id="dashboard-subtitle">正在读取登录状态。</p>
          </div>
          <div class="console-top-actions">
            <div class="console-search" aria-label="搜索">
              <span>⌕</span>
              <input id="console-search-input" type="search" placeholder="搜索当前视图" />
            </div>
            <div class="user-chip" aria-label="当前用户">
              <span id="user-avatar" class="user-avatar">A</span>
              <span id="user-chip-name">admin</span>
            </div>
            <span id="admin-badge" class="status-chip neutral" hidden>管理员</span>
            <button type="button" id="logout-button" class="ghost-button">退出登录</button>
          </div>
        </header>

        <section id="view-root" aria-live="polite"></section>
        <p id="dashboard-message" class="message" role="status"></p>
      </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/vue@3.5.35/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@nutui/nutui@4.3.15-beta.1/dist/nutui.umd.js"></script>
    <script src="/mobile-app.js?v=20260609-192948"></script>

    <script src="/home.js?v=20260609-192948" type="module"></script>
  </body>
</html>
