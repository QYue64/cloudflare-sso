<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>登录</title>
    <link rel="stylesheet" href="/styles.css?v=20260609-192948" />
    <script src="/config.js"></script>
  </head>
  <body>
    <main class="auth-shell">
      <div class="auth-stage">
        <section class="auth-brief" aria-label="系统说明">
          <div class="auth-brief-logo">SSO</div>
          <h1>统一登陆平台</h1>
          <p>统一登陆、OIDC 应用接入、用户与会话管理，都在一个后台里完成。</p>
          <div class="auth-brief-list">
            <span>用户名/邮箱登录</span>
            <span>验证码注册</span>
            <span>后台集中管理</span>
          </div>
        </section>

      <section class="auth-panel" aria-label="登录">
        <div class="brand">
          <span class="mark">SSO</span>
          <div>
            <h1>统一登陆</h1>
            <p>使用用户名或邮箱登录统一登陆平台。</p>
          </div>
        </div>

        <form id="login-form" class="auth-form">
          <label>
            邮箱或用户名
            <input name="identifier" autocomplete="username" placeholder="请输入邮箱或用户名" required />
          </label>
          <label>
            密码
            <input name="password" type="password" autocomplete="current-password" placeholder="请输入密码" required />
          </label>
          <p id="login-message" class="message" role="status"></p>
          <button type="submit">登录</button>
        </form>

        <p class="auth-switch">没有账号？<a id="register-link" href="/register">去注册</a></p>
      </section>
      </div>
    </main>
    <script src="/login.js" type="module"></script>
  </body>
</html>
