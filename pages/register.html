<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>注册</title>
    <link rel="stylesheet" href="/styles.css?v=20260609-192948" />
    <script src="/config.js"></script>
  </head>
  <body>
    <main class="auth-shell">
      <div class="auth-stage">
        <section class="auth-brief" aria-label="系统说明">
          <div class="auth-brief-logo">SSO</div>
          <h1>创建平台账号</h1>
          <p>注册后可使用同一账号访问已接入的业务系统，并在账号中心管理授权和会话。</p>
          <div class="auth-brief-list">
            <span>邮箱验证码</span>
            <span>用户名登录</span>
            <span>授权可撤销</span>
          </div>
        </section>

      <section class="auth-panel" aria-label="注册">
        <div class="brand">
          <span class="mark">SSO</span>
          <div>
            <h1>创建账号</h1>
            <p>填写邮箱后发送验证码完成注册。</p>
          </div>
        </div>

        <form id="register-form" class="auth-form">
          <label>
            用户名
            <input name="username" autocomplete="username" placeholder="请输入 3-32 位用户名" required minlength="3" maxlength="32" pattern="[A-Za-z0-9][A-Za-z0-9_-]{2,31}" />
          </label>
          <label>
            邮箱
            <input name="email" type="email" autocomplete="email" placeholder="请输入邮箱地址" required />
          </label>
          <label>
            密码
            <input name="password" type="password" autocomplete="new-password" placeholder="请输入至少 6 位密码" required minlength="6" />
          </label>
          <label>
            确认密码
            <input name="confirmPassword" type="password" autocomplete="new-password" placeholder="请再次输入密码" required minlength="6" />
          </label>
          <div class="inline-fields">
            <label>
              验证码
              <input name="code" inputmode="numeric" maxlength="6" pattern="[0-9]{6}" autocomplete="one-time-code" placeholder="6 位验证码" required />
            </label>
            <button type="button" id="send-code-button">发送验证码</button>
          </div>
          <p id="register-message" class="message" role="status"></p>
          <button type="submit">注册并登录</button>
        </form>

        <p class="auth-switch">已有账号？<a id="login-link" href="/login">去登录</a></p>
      </section>
      </div>
    </main>
    <script src="/register.js" type="module"></script>
  </body>
</html>
